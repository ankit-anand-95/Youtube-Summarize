services:
  - type: web
    name: youtube-summarizer-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --timeout 120
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true          # Render auto-generates a secure random value
      - key: FERNET_KEY
        generateValue: true          # Render auto-generates encryption key for API keys
      - key: DATABASE_URL
        fromDatabase:
          name: youtube-summarizer-ai-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        value: ""                    # ← Paste your key in Render dashboard
      - key: DAILY_LIMIT
        value: "10"
      - key: CLAUDE_MODEL
        value: claude-haiku-4-5-20251001

databases:
  - name: youtube-summarizer-ai-db
    databaseName: summarizer
    plan: free
