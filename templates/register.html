<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — YouTube Summarizer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f14;
      --surface: #13151c;
      --card: #1a1d27;
      --border: #2a2d3e;
      --accent: #7c83ff;
      --accent-dim: #5c61cc;
      --text: #e8eaf0;
      --muted: #6b7080;
      --error: #f07167;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
    }
    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .logo span { color: var(--accent); }
    .subtitle {
      color: var(--muted);
      font-size: .875rem;
      margin-bottom: 32px;
    }
    .field { margin-bottom: 18px; }
    label {
      display: block;
      font-size: .8rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    input {
      width: 100%;
      padding: 11px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: .95rem;
      outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: var(--accent); }
    .btn {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background .15s;
    }
    .btn:hover { background: var(--accent-dim); }
    .error-msg {
      background: rgba(240,113,103,.12);
      border: 1px solid rgba(240,113,103,.3);
      color: var(--error);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: .875rem;
      margin-bottom: 20px;
    }
    .hint {
      color: var(--muted);
      font-size: .78rem;
      margin-top: 5px;
    }
    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: .875rem;
      color: var(--muted);
    }
    .footer a { color: var(--accent); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">▶ YouTube <span>Summarizer</span></div>
    <div class="subtitle">Create a new account</div>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="field">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@example.com" required autofocus />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required minlength="8" />
        <div class="hint">At least 8 characters</div>
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" name="confirm" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn">Create Account</button>
    </form>

    <div class="footer">
      Already have an account? <a href="/login">Sign in</a>
    </div>
  </div>
</body>
</html>
